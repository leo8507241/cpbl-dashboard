name: CPBL 每日自動更新

on:
  schedule:
    # 溫哥華時間早上 9:00 PDT（UTC-7，4~10月）= 16:00 UTC = 台灣半夜 00:00
    # 冬令時 PST（UTC-8，11~3月）時為早上 8:00
    - cron: '0 16 * * *'
  workflow_dispatch:  # 允許在 GitHub 頁面手動觸發

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. 取得程式碼 ───────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python 環境 ──────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt huggingface_hub pytz

      # ── 3. 從 HuggingFace 下載最新 pitcher_pitches.csv ─────────
      - name: Download pitcher_pitches.csv
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PYEOF'
          import os, shutil, sys
          from huggingface_hub import HfApi

          HF_TOKEN = os.environ["HF_TOKEN"]
          REPO     = "leo88888/cpbl-dashboard"
          FILENAME = "pitcher_pitches.csv"

          # 先確認檔案是否存在於 Space，再決定要不要下載
          api = HfApi(token=HF_TOKEN)
          try:
              files = [f.rfilename for f in api.list_repo_files(REPO, repo_type="space")]
              exists_on_hf = FILENAME in files
          except Exception as e:
              print(f"⚠️  無法列出 Space 檔案：{e}")
              exists_on_hf = False

          if not exists_on_hf:
              # 第一次執行或檔案遺失 → 建立只有 header 的空白 CSV，讓 pipeline 從頭重建
              print("⚠️  HF Space 上沒有 pitcher_pitches.csv，建立空白 CSV，pipeline 將從頭重建資料")
              import shutil as _sh
              if os.path.exists("cpbl_skeleton.csv"):
                  _sh.copy("cpbl_skeleton.csv", FILENAME)
                  print("✅ 從 cpbl_skeleton.csv 複製 header")
              else:
                  # 寫入最小 header（和 fetch_new_pitchers.py 產出一致）
                  header = ("pitcher,pitcher_uid,year,season_uid,game_date,inning,bases,"
                            "end_outs,LI,RE24,WPA,away_score,home_score,batter,batter_uid,"
                            "b_hand,pa_order,pitch_seq,balls_before,strikes_before,"
                            "is_first_pitch,pitch_type,velocity,rpm,coord_x,coord_y,"
                            "is_strike,is_ball,in_play,result_code,pa_result,pa_result_type,"
                            "is_hit,trajectory,pitch_loc_x,pitch_loc_y\n")
                  with open(FILENAME, "w", encoding="utf-8") as f:
                      f.write(header)
                  print("✅ 建立空白 header CSV")
              sys.exit(0)

          # 檔案存在 → 下載
          from huggingface_hub import hf_hub_download
          try:
              path = hf_hub_download(
                  repo_id=REPO,
                  filename=FILENAME,
                  repo_type="space",
                  token=HF_TOKEN,
              )
              shutil.copy(path, FILENAME)
              size = os.path.getsize(FILENAME)
              print(f"✅ 下載完成，{size/1e6:.1f} MB")
          except Exception as e:
              print(f"❌ 下載失敗：{e}")
              sys.exit(1)
          PYEOF

      # ── 4. 執行每日更新 + 發送 LINE 報告 ───────────────────────
      - name: Run daily pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # 修正：舊版這裡設SUPABASE_WRITE_KEY，但daily_update.py讀的是SUPABASE_KEY，
          # 等於一直沒吃到有寫入權限的key、默默fallback成寫死的publishable key。
          SUPABASE_KEY: ${{ secrets.SUPABASE_WRITE_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          HF_USER: leo88888
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python daily_pipeline.py

      # ── 4b. 同步投手疲勞分析資料到 Supabase(單場即時換投監控頁面用) ─
      - name: Sync intra-game fatigue data to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_WRITE_KEY }}
        run: python sync_intra_game_to_supabase.py --incremental

      # ── 5. 上傳更新後的 pitcher_pitches.csv 回 HuggingFace ─────
      - name: Upload pitcher_pitches.csv to HuggingFace
        if: always()  # 即使前一步有警告也要上傳
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PYEOF'
          import os, sys
          from huggingface_hub import HfApi
          FILENAME = "pitcher_pitches.csv"
          if not os.path.exists(FILENAME):
              print(f"⚠️  {FILENAME} 不存在，跳過上傳（pipeline 可能沒有產出資料）")
              sys.exit(0)
          size = os.path.getsize(FILENAME)
          print(f"上傳 {FILENAME}（{size/1e6:.1f} MB）...")
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_file(
              path_or_fileobj=FILENAME,
              path_in_repo=FILENAME,
              repo_id="leo88888/cpbl-dashboard",
              repo_type="space",
              commit_message="Auto update pitcher_pitches.csv",
          )
          print("✅ pitcher_pitches.csv 已上傳")
          PYEOF
